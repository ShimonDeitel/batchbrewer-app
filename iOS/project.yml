name: Batchbrewer
options:
  bundleIdPrefix: com.shimondeitel.homebrew
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Batchbrewer:
    type: application
    platform: iOS
    sources:
      - path: Batchbrewer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.homebrew
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Batchbrewer/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BatchbrewerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BatchbrewerTests
    dependencies:
      - target: Batchbrewer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.homebrew.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BatchbrewerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BatchbrewerUITests
    dependencies:
      - target: Batchbrewer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.homebrew.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Batchbrewer:
    build:
      targets:
        Batchbrewer: all
        BatchbrewerTests: [test]
        BatchbrewerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Batchbrewer.storekit
    test:
      config: Debug
      storeKitConfiguration: Batchbrewer.storekit
      targets:
        - BatchbrewerTests
        - BatchbrewerUITests
    archive:
      config: Release
